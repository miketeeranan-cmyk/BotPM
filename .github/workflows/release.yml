# Ship a new version:  git tag v1.2.0 && git push --tags
#
# Runs on Windows because PyInstaller cannot cross-compile -- a Windows exe can
# only be built on Windows, which is why this exists rather than a local script.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Matches the 3.14 used for development on macOS.
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stamp version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION = \"${VERSION}\"" > version.py
          echo "Building ${VERSION}"

      - name: Build
        run: pyinstaller --clean --noconfirm TeamSheet.spec

      - name: Smoke test — actually run the exe
        shell: pwsh
        run: |
          # v1.0.0 shipped a crash because the old check only ran `test -f` --
          # it proved the file existed but never executed it. This runs the real
          # windowed exe (Start-Process waits for a GUI-subsystem process; a bare
          # call would not) and fails on a non-zero exit. --selftest writes its
          # report to a file because a console=False exe has no stdout.
          if (-not (Test-Path dist/TeamSheet.exe)) { throw "exe missing" }
          $p = Start-Process -FilePath dist/TeamSheet.exe -ArgumentList '--selftest' -Wait -PassThru
          $log = Join-Path $env:LOCALAPPDATA 'TeamSheet\selftest.log'
          if (Test-Path $log) { Get-Content $log } else { Write-Host "no selftest.log written" }
          Write-Host "exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "selftest failed" }

      - name: Verify no credentials were bundled
        shell: bash
        run: |
          # The release asset is public. A service account key inside it would
          # be extractable by anyone, so fail the build rather than ship one.
          if grep -qa "BEGIN PRIVATE KEY" dist/TeamSheet.exe; then
            echo "::error::A private key is embedded in the exe. Refusing to publish."
            exit 1
          fi
          echo "No private key found in the bundle."

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/TeamSheet.exe
          generate_release_notes: true
